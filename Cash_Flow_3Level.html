<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cash Flow Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;background:#F4F6F9;color:#1C1F26;font-size:13px;line-height:1.4}
.hdr{background:#1C274C;color:#fff;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25);position:sticky;top:0;z-index:300}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-logo{width:36px;height:36px;background:#3B82F6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hdr-title{font-size:16px;font-weight:700;letter-spacing:.3px}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:1px}
.hdr-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:600;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);padding:3px 10px;border-radius:20px;color:rgba(255,255,255,.85)}
.bc{background:#fff;border-bottom:1px solid #E5E7EB;padding:0 32px;height:38px;display:flex;align-items:center;gap:8px;font-size:12px;position:sticky;top:64px;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.bc a{color:#3B82F6;cursor:pointer;font-weight:600}.bc a:hover{text-decoration:underline}
.bc .sep{color:#D1D5DB}.bc .cur{color:#374151;font-weight:600}
.page{padding:24px 32px}
.tiles{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:24px}
.tile{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid transparent;transition:box-shadow .15s;min-width:180px;flex:1}
.tile:hover{box-shadow:0 4px 14px rgba(0,0,0,.11)}
.t-ent{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.t-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px}
.t-lbl{font-size:10px;color:#9CA3AF;font-weight:500}
.t-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.c-in{color:#059669}.c-out{color:#DC2626}.c-np{color:#2563EB}.c-nn{color:#DC2626}
.t-div{height:1px;background:#F3F4F6;margin:10px 0 4px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:20px;overflow:hidden}
.card-hdr{padding:14px 20px;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;gap:10px;background:#FAFAFA}
.card-hdr h2{font-size:13px;font-weight:700;color:#111827}
.card-hint{font-size:11px;color:#9CA3AF;margin-left:auto}
.tscroll{overflow-x:auto}
.tscroll::-webkit-scrollbar{height:5px}
.tscroll::-webkit-scrollbar-track{background:#F9FAFB}
.tscroll::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
table{width:100%;border-collapse:collapse}
th{padding:0 14px;font-weight:700;color:#374151;background:#F9FAFB;border-bottom:1px solid #E5E7EB;white-space:nowrap;text-align:right;height:32px;font-size:10px}
th.nm{text-align:left;min-width:220px;position:sticky!important;left:0;z-index:22!important;background:#F9FAFB;border-right:1px solid #E5E7EB;font-size:11px}
th.eg{text-align:center;font-size:10px;font-weight:800;height:30px;border-bottom:2px solid}
th.sh-in{background:#F0FDF4;color:#166534;font-size:9px;min-width:120px;height:26px}
th.sh-out{background:#FFF1F2;color:#9F1239;font-size:9px;min-width:120px}
th.sh-net{background:#EEF2FF;color:#1D4ED8;font-size:9px;min-width:110px;font-weight:700}
th.l1-in{background:#F0FDF4;color:#166534;font-size:11px;font-weight:700;min-width:200px;height:38px}
th.l1-out{background:#FFF1F2;color:#9F1239;font-size:11px;font-weight:700;min-width:200px}
th.l1-net{background:#1C274C;color:#fff;font-size:11px;font-weight:800;min-width:200px}
td{padding:9px 14px;border-bottom:1px solid #F3F4F6;text-align:right;font-size:12px;vertical-align:middle;font-variant-numeric:tabular-nums;white-space:nowrap;color:#374151}
td.nm{text-align:left;white-space:normal;position:sticky;left:0;background:#fff;z-index:5;min-width:220px;border-right:1px solid #F3F4F6;font-size:12px;padding-left:20px}
tr.cat{cursor:pointer;transition:background .1s}
tr.cat:hover td{background:#EFF6FF}tr.cat:hover td.nm{background:#EFF6FF}
tr.cat.act td{background:#DBEAFE}tr.cat.act td.nm{background:#DBEAFE}
tr.cat td.nm{font-weight:700;color:#1E40AF}
.di{display:inline-block;width:16px;height:16px;line-height:16px;text-align:center;background:#DBEAFE;color:#1D4ED8;border-radius:4px;font-size:8px;margin-left:8px;vertical-align:middle;transition:transform .18s}
tr.cat.act .di{transform:rotate(90deg)}
tr.sub td{font-size:12px;color:#4B5563}
tr.sub.dr{cursor:pointer}tr.sub.dr td.nm{color:#2563EB}
tr.sub.dr:hover td{background:#FEFCE8}tr.sub.dr:hover td.nm{background:#FEFCE8}
td.ind{padding-left:38px!important}
.star{color:#D97706;font-size:12px;margin-left:6px}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.bg{background:#EFF6FF;color:#1D4ED8}.bi{background:#F0FDF4;color:#166534}
tr.tot td{font-weight:800;background:#F8FAFC!important;border-top:2px solid #E2E8F0;font-size:12px;color:#111827}
tr.tot td.nm{background:#F8FAFC!important}
tr.l3 td{font-size:12px;color:#374151}
tr.l3:hover td{background:#F9FAFB!important}
tr.l3 td.nm{background:#fff}
tr.l3t td{font-weight:800;background:#EEF2FF!important;border-top:2px solid #C7D2FE;color:#111827}
tr.l3t td.nm{background:#EEF2FF!important}
.pos{color:#059669}.neg{color:#DC2626}.zero{color:#D1D5DB}
.net-p{color:#1D4ED8;font-weight:700}.net-n{color:#DC2626;font-weight:700}
.d-hdr{padding:14px 20px;background:#FFFBEB;border-bottom:1px solid #FDE68A;display:flex;align-items:center;justify-content:space-between}
.d-hdr span{font-size:13px;font-weight:700;color:#111827}
.back{cursor:pointer;font-size:11px;font-weight:700;background:#1C274C;color:#fff;padding:5px 14px;border-radius:6px;border:none;transition:background .15s;letter-spacing:.3px}
.back:hover{background:#2D3A6B}
</style>
</head>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">💰</div>
    <div>

  </div>
</div>

const EK=D.entity_keys;
const EL=D.entity_labels;

// Color palette — cycles for any number of entities
const PAL=[
  {bg:'EFF6FF',fg:'1D4ED8',hd:'BFDBFE'},
  {bg:'F5F3FF',fg:'6D28D9',hd:'DDD6FE'},
  {bg:'ECFDF5',fg:'065F46',hd:'A7F3D0'},
  {bg:'FFFBEB',fg:'92400E',hd:'FCD34D'},
  {bg:'FFF1F2',fg:'9F1239',hd:'FECDD3'},
  {bg:'F0F9FF',fg:'0369A1',hd:'BAE6FD'},
  {bg:'FDF4FF',fg:'86198F',hd:'F0ABFC'},
  {bg:'FEFCE8',fg:'854D0E',hd:'FEF08A'},
];
const p=i=>PAL[i%PAL.length];

let curCat=null,curSub=null;

function fmtN(n){if(n===0||n==null)return null;const neg=n<0,a=Math.abs(n);const s='₹ '+a.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});return{s:neg?'('+s+')':s,neg};}
function fmt(n,isNet){if(n==null||n===0)return '<span class="zero">–</span>';const r=fmtN(n);if(!r)return '<span class="zero">–</span>';const cls=isNet?(r.neg?'net-n':'net-p'):(r.neg?'neg':'pos');return `<span class="${cls}">${r.s}</span>`;}
function fmtT(n,cls){const r=fmtN(n);return r?`<span class="${cls}">${r.s}</span>`:'<span class="zero">–</span>';}

// Init header
document.getElementById('hdr-sub').textContent='Period: '+D.period+'  ·  All figures in Indian Rupees (₹)  ·  NET = Inflow − Outflow';
document.getElementById('hdr-pills').innerHTML=EL.map(l=>`<span class="pill">${l}</span>`).join('');

// Entity cells: In | Out | NET per entity
function eCells(row){
  let h='';
  EK.forEach(k=>{
    const net=(row[k+'_in']||0)-(row[k+'_out']||0);
    h+=`<td>${fmt(row[k+'_in'])}</td><td>${fmt(row[k+'_out'])}</td><td style="background:#EEF2FF;">${fmt(net,true)}</td>`;
  });
  return h;
}

// 2-row entity header (group label spanning 3 cols + In/Out/NET sub-headers)
function buildEntityHdr(id,nameLabel){
  let cols='';
  EK.forEach((k,i)=>{
    const c=p(i);
    cols+=`<th class="eg" style="background:#${c.hd};color:#${c.fg};border-bottom-color:#${c.fg};" colspan="3">${EL[i]}</th>`;
  });
  const sub=EK.map(()=>'<th class="sh-in">Inflow</th><th class="sh-out">Outflow</th><th class="sh-net">NET</th>').join('');
  document.getElementById(id).innerHTML=`<tr><th class="nm" rowspan="2">${nameLabel}</th>${cols}</tr><tr>${sub}</tr>`;
}

// Summary tiles — one per entity + combined
function buildTiles(){
  let h='';
  EK.forEach((k,i)=>{
    const c=p(i);
    const inf=D.grand.in[k],out=D.grand.out[k],net=D.grand.net[k];
    const nc=net>=0?'c-np':'c-nn';
    h+=`<div class="tile" style="border-top-color:#${c.fg}">
      <div class="t-ent" style="color:#${c.fg}">${EL[i]}</div>
      <div class="t-row"><span class="t-lbl">Inflow</span><span class="t-val c-in">${fmtT(inf,'c-in')}</span></div>
      <div class="t-row"><span class="t-lbl">Outflow</span><span class="t-val c-out">${fmtT(out,'c-out')}</span></div>
      <div class="t-div"></div>
      <div class="t-row"><span class="t-lbl">Net</span><span class="t-val ${nc}">${fmtT(net,nc)}</span></div>
    </div>`;
  });
  const gn=D.grand.net.total,gnc=gn>=0?'c-np':'c-nn';
  h+=`<div class="tile" style="border-top-color:#EF4444">
    <div class="t-ent" style="color:#EF4444">All Entities Combined</div>
    <div class="t-row"><span class="t-lbl">Total Inflow</span><span class="t-val c-in">${fmtT(D.grand.in.total,'c-in')}</span></div>
    <div class="t-row"><span class="t-lbl">Total Outflow</span><span class="t-val c-out">${fmtT(D.grand.out.total,'c-out')}</span></div>
    <div class="t-div"></div>
    <div class="t-row"><span class="t-lbl">Net</span><span class="t-val ${gnc}">${fmtT(gn,gnc)}</span></div>
  </div>`;
  document.getElementById('tiles').innerHTML=h;
}

// Level 1 — all categories
function renderL1(){
  document.getElementById('th1').innerHTML=`<tr><th class="nm" style="min-width:280px;">Category</th><th class="l1-in">Total Inflow</th><th class="l1-out">Total Outflow</th><th class="l1-net">NET (Inflow − Outflow)</th></tr>`;
  const g=D.grand;
  let h='';
  D.categories.forEach((c,ci)=>{
    const tIn=EK.reduce((s,k)=>s+(c[k+'_in']||0),0);
    const tOut=EK.reduce((s,k)=>s+(c[k+'_out']||0),0);
    h+=`<tr class="cat" id="cr${ci}" onclick="drillCat(${ci})"><td class="nm">${c.name}<span class="di">▶</span></td><td>${fmt(tIn)}</td><td>${fmt(tOut)}</td><td style="background:#EEF2FF;">${fmt(c.net,true)}</td></tr>`;
  });
  const gTIn=EK.reduce((s,k)=>s+g.in[k],0);
  const gTOut=EK.reduce((s,k)=>s+g.out[k],0);
  h+=`<tr class="tot"><td class="nm" style="padding-left:20px;">Grand Total</td><td>${fmt(gTIn)}</td><td>${fmt(gTOut)}</td><td style="background:#EEF2FF;">${fmt(g.net.total,true)}</td></tr>`;
  document.getElementById('tb1').innerHTML=h;
}

function drillCat(ci){curCat=ci;curSub=null;document.querySelectorAll('.cat').forEach(r=>r.classList.remove('act'));const r=document.getElementById('cr'+ci);if(r)r.classList.add('act');showL2();}

function showL2(){
  const cat=D.categories[curCat];
  document.getElementById('v2-title').textContent=cat.name+' — Subcategories';
  buildEntityHdr('th2','Subcategory');
  let h='';
  cat.subcategories.forEach((s,si)=>{
    const dr=s.has_detail;
    const star=dr?'<span class="star">✦</span>':'';
    const tag=s.is_group?'<span class="badge bg">Group</span>':'<span class="badge bi">Line Item</span>';
    const clk=dr?`onclick="drillSub(${si})"`:'' ;
    h+=`<tr class="sub${dr?' dr':''}" ${clk}><td class="nm ind">${s.name}${star}${tag}</td>${eCells(s)}</tr>`;
  });
  h+=`<tr class="tot"><td class="nm ind" style="padding-left:38px;">Subtotal</td>${EK.map(k=>{const net=(cat[k+'_in']||0)-(cat[k+'_out']||0);return `<td>${fmt(cat[k+'_in'])}</td><td>${fmt(cat[k+'_out'])}</td><td style="background:#EEF2FF;">${fmt(net,true)}</td>`;}).join('')}</tr>`;
  document.getElementById('tb2').innerHTML=h;
  document.getElementById('v2').style.display='block';
  document.getElementById('v3').style.display='none';
  document.getElementById('v2').scrollIntoView({behavior:'smooth',block:'nearest'});
  updateBC();
}

function drillSub(si){
  curSub=si;
  const cat=D.categories[curCat],sub=cat.subcategories[si];
  if(!sub.has_detail||!sub.details||!sub.details.length){alert('No individual entries available.');return;}
  document.getElementById('v3-title').innerHTML=`<strong>${cat.name}</strong> &rsaquo; <strong>${sub.name}</strong>`;
  buildEntityHdr('th3','Entry / Particulars');
  let entries=sub.details.filter(e=>e.is_leaf);
  if(!entries.length)entries=sub.details;
  const flds=EK.flatMap(k=>[k+'_in',k+'_out']);
  const tots={};flds.forEach(f=>tots[f]=0);
  let h='';
  entries.forEach(e=>{flds.forEach(f=>tots[f]+=(e[f]||0));h+=`<tr class="l3"><td class="nm" style="padding-left:20px;">${e.name}</td>${eCells(e)}</tr>`;});
  h+=`<tr class="l3t"><td class="nm" style="padding-left:20px;">Total</td>${EK.map(k=>{const net=(tots[k+'_in']||0)-(tots[k+'_out']||0);return `<td>${fmt(tots[k+'_in'])}</td><td>${fmt(tots[k+'_out'])}</td><td style="background:#EEF2FF;">${fmt(net,true)}</td>`;}).join('')}</tr>`;
  document.getElementById('tb3').innerHTML=h;
  document.getElementById('v3').style.display='block';
  document.getElementById('v3').scrollIntoView({behavior:'smooth',block:'nearest'});
  updateBC();
}

function goHome(){curCat=null;curSub=null;document.getElementById('v2').style.display='none';document.getElementById('v3').style.display='none';document.querySelectorAll('.cat').forEach(r=>r.classList.remove('act'));updateBC();window.scrollTo({top:0,behavior:'smooth'});}
function goBack(){if(curSub!==null){curSub=null;document.getElementById('v3').style.display='none';document.getElementById('v2').scrollIntoView({behavior:'smooth',block:'nearest'});}else{goHome();}updateBC();}
function updateBC(){let h='<a onclick="goHome()">🏠 Dashboard</a>';if(curCat!==null){const c=D.categories[curCat];h+=` <span class="sep">›</span> <a onclick="showL2()">${c.name}</a>`;}if(curSub!==null){const s=D.categories[curCat].subcategories[curSub];h+=` <span class="sep">›</span> <span class="cur">${s.name}</span>`;}document.getElementById('bc').innerHTML=h;}

buildTiles();renderL1();updateBC();
</script>
